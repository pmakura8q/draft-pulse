<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>DRIFT PULSE</title>
<style>
  :root{
    --bg:#0B0E14;
    --bg2:#10141d;
    --cyan:#4FF7D1;
    --magenta:#FF3D8A;
    --gold:#FFC857;
    --ink:#E7ECF3;
    --dim:#5B6577;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:radial-gradient(120% 140% at 50% -10%, #151b26 0%, var(--bg) 55%, #05070a 100%);
    font-family:'IBM Plex Mono','Courier New',monospace;
    color:var(--ink);
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    touch-action:none;
    overscroll-behavior:none;
  }
  #wrap{
    position:relative;
    height:94vh;
    height:94dvh;
    width:auto;
    max-width:95vw;
    aspect-ratio: 3/4;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,0.06), 0 30px 80px rgba(0,0,0,0.6);
    background:#05070a;
  }
  canvas{display:block;width:100%;height:100%;touch-action:none;}

  #wrap[data-theme="bright"] .hud .stat{ color:#8a7f6b; }
  #wrap[data-theme="bright"] .hud .stat b{ color:#2e2a22; }
  #wrap[data-theme="bright"] .hint{ color:#8a7f6b; }
  #wrap[data-theme="bright"] .icon-btn{
    background:rgba(255,255,255,0.5);
    border-color:rgba(0,0,0,0.1);
    color:#2e2a22;
  }

  .hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 16px;
    pointer-events:none;
    z-index:5;
  }
  .hud .stat{
    font-size:13px; letter-spacing:0.08em;
    color:var(--dim);
  }
  .hud .stat b{
    display:block;
    font-size:22px;
    color:var(--ink);
    font-weight:600;
    letter-spacing:0;
  }
  .hud .coins{ color:var(--gold); }
  .hud .coins b{ color:var(--gold); }

  .difficulty-bar{
    position:absolute; top:0; left:0; right:0; height:3px;
    background:rgba(255,255,255,0.06);
    z-index:5;
  }
  .difficulty-bar > i{
    display:block; height:100%; width:0%;
    background:linear-gradient(90deg, var(--cyan), var(--magenta));
    transition:width .4s ease;
  }

  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:32px;
    background:linear-gradient(180deg, rgba(5,7,10,0.2), rgba(5,7,10,0.9) 70%);
    z-index:10;
  }
  .overlay.hidden{ display:none; }

  .title{
    font-family:'Segoe UI', sans-serif;
    font-weight:800;
    font-size:38px;
    letter-spacing:0.02em;
    margin:0 0 6px;
    background:linear-gradient(90deg, var(--cyan), #9be8ff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .subtitle{
    color:var(--dim);
    font-size:13px;
    letter-spacing:0.06em;
    margin-bottom:28px;
  }
  .bignum{
    font-family:'Segoe UI', sans-serif;
    font-size:56px; font-weight:800; color:var(--ink);
    margin:4px 0;
  }
  .label{ color:var(--dim); font-size:12px; letter-spacing:0.1em; text-transform:uppercase; }

  .btn{
    margin-top:22px;
    background:var(--cyan);
    color:#052027;
    border:none;
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.05em;
    padding:14px 28px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(79,247,209,0.25);
  }
  .btn.secondary{
    background:transparent;
    color:var(--ink);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:none;
    margin-top:10px;
  }
  .btn.ad{
    background:var(--gold);
    color:#332400;
    box-shadow:0 8px 24px rgba(255,200,87,0.25);
  }
  .row{ display:flex; gap:28px; margin:18px 0; }
  .rowitem b{ display:block; font-size:24px; }

  .chest-pop{
    position:absolute; left:50%; top:64px;
    transform:translate(-50%,-12px);
    background:rgba(10,14,20,0.92);
    border:1px solid rgba(255,200,87,0.5);
    border-radius:12px;
    padding:8px 16px;
    text-align:center;
    opacity:0;
    z-index:8;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
  }
  .chest-pop.show{
    opacity:1;
    transform:translate(-50%,0);
  }
  .chest-pop .amt{
    font-family:'Segoe UI',sans-serif;
    font-size:18px; font-weight:800; color:var(--gold);
  }
  .chest-pop .tag{
    font-size:9px; color:var(--dim); letter-spacing:0.08em;
  }

  .hint{
    position:absolute; bottom:18px; left:0; right:0;
    text-align:center;
    font-size:11px; color:var(--dim);
    letter-spacing:0.06em;
    z-index:5;
    pointer-events:none;
  }

  .icon-btn{
    pointer-events:auto;
    width:32px; height:32px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(10,14,20,0.5);
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:15px;
  }

  .settings-panel{
    position:absolute; inset:0;
    background:rgba(5,7,10,0.94);
    z-index:20;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:32px;
  }
  .settings-panel.hidden{ display:none; }
  .settings-panel h2{
    font-family:'Segoe UI',sans-serif;
    font-size:20px; margin:0 0 26px; color:var(--ink);
  }
  .slider-row{
    width:100%; max-width:280px;
    margin-bottom:20px;
    text-align:left;
  }
  .slider-row .slabel{
    display:flex; justify-content:space-between;
    font-size:11px; letter-spacing:0.08em; color:var(--dim);
    margin-bottom:6px;
    text-transform:uppercase;
  }
  .slider-row .slabel span:last-child{ color:var(--cyan); }
  input[type=range]{
    -webkit-appearance:none;
    width:100%; height:4px;
    border-radius:2px;
    background:rgba(255,255,255,0.12);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:16px; height:16px;
    border-radius:50%;
    background:var(--cyan);
    cursor:pointer;
    box-shadow:0 0 8px rgba(79,247,209,0.6);
  }
  input[type=range]::-moz-range-thumb{
    width:16px; height:16px; border:none; border-radius:50%;
    background:var(--cyan); cursor:pointer;
  }

  .toggle-group{
    display:flex; gap:8px;
  }
  .toggle-btn{
    flex:1;
    padding:10px 8px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.04);
    color:var(--dim);
    font-family:inherit;
    font-size:12px;
    letter-spacing:0.03em;
    cursor:pointer;
  }
  .toggle-btn.active{
    border-color:var(--cyan);
    color:var(--ink);
    background:rgba(79,247,209,0.12);
  }

  .swatch-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:18px;
    margin:16px 0 22px;
  }
  .swatch-item{
    position:relative;
    display:flex; flex-direction:column; align-items:center;
    gap:4px;
  }
  .swatch{
    width:48px; height:48px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.15);
    cursor:pointer;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    position:relative;
  }
  .swatch.active{
    border-color:#fff;
    box-shadow:0 0 0 3px rgba(255,255,255,0.25), 0 0 14px currentColor;
  }
  .swatch.auto{
    background:conic-gradient(#4FF7D1,#9d7bff,#FF3D8A,#ff5b3d,#4FF7D1);
  }
  .swatch.locked{ opacity:0.35; }
  .swatch-price{
    font-size:10px; color:var(--gold); letter-spacing:0.03em;
  }
  .shop-tabs{ display:flex; gap:8px; margin-bottom:6px; }
  .shop-section-label{
    font-size:11px; color:var(--dim); letter-spacing:0.1em;
    text-transform:uppercase; margin:14px 0 4px; text-align:left; width:100%;
  }
  .wallet{
    display:inline-flex; align-items:center; gap:6px;
    font-size:13px; color:var(--gold);
    background:rgba(255,200,87,0.08);
    border:1px solid rgba(255,200,87,0.25);
    border-radius:999px;
    padding:6px 14px;
    margin-bottom:18px;
  }
  .mode-row{ display:flex; gap:12px; width:100%; max-width:320px; }
  .mode-row .btn{ flex:1; margin-top:0; }
  .overlay{ overflow-y:auto; }

  .stage-list{
    width:100%; max-width:360px;
    display:flex; flex-direction:column; gap:10px;
    margin:16px 0 22px;
  }
  .stage-card{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 16px;
    border:1px solid rgba(255,255,255,0.14);
    border-radius:12px;
    background:rgba(255,255,255,0.03);
    cursor:pointer;
    text-align:left;
  }
  .stage-card:hover{ border-color:var(--cyan); }
  .stage-card.locked{ opacity:0.4; cursor:default; }
  .stage-card .left{ display:flex; flex-direction:column; gap:2px; }
  .stage-card .num{
    font-family:'Segoe UI',sans-serif; font-weight:800; font-size:15px; color:var(--ink);
  }
  .stage-card .desc{ font-size:11px; color:var(--dim); max-width:210px; }
  .stage-card .meta{ font-size:11px; color:var(--gold); white-space:nowrap; }
  .stage-card .meta.done{ color:var(--cyan); }

  .stage-grid{
    display:flex; flex-direction:column; gap:10px;
    width:100%; max-width:340px;
    margin:18px 0 22px;
  }
  .stage-card{
    display:flex; align-items:center; gap:14px;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.03);
    cursor:pointer;
    text-align:left;
  }
  .stage-card.locked{
    opacity:0.4;
    cursor:default;
  }
  .stage-card .num{
    font-family:'Segoe UI',sans-serif;
    font-weight:800; font-size:22px;
    color:var(--cyan);
    width:32px; text-align:center;
    flex-shrink:0;
  }
  .stage-card .info{ flex:1; }
  .stage-card .name{ font-weight:700; font-size:14px; color:var(--ink); }
  .stage-card .desc{ font-size:11px; color:var(--dim); margin-top:2px; }
  .stage-card .target{ font-size:11px; color:var(--gold); margin-top:2px; }
  .stage-card .lock-icon{ font-size:18px; color:var(--dim); flex-shrink:0; }
  .stage-card.cleared{ border-color:rgba(79,247,209,0.35); background:rgba(79,247,209,0.05); }
  .clear-badge{
    display:inline-block;
    font-size:9px;
    font-weight:800;
    color:#052027;
    background:var(--cyan);
    padding:2px 6px;
    border-radius:6px;
    margin-left:6px;
    letter-spacing:0.04em;
    vertical-align:middle;
  }

  .overlay.shop-bg{
    background: rgba(6,8,12,0.97);
  }
  .shop-preview-box{
    width:100%; max-width:260px;
    border-radius:14px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.14);
    margin-bottom:16px;
    background:#000;
  }
  #previewCanvas{ display:block; width:100%; height:auto; }

  .confirm-box{
    width:100%; max-width:280px;
    margin-top:14px;
    padding:16px;
    border-radius:14px;
    border:1px solid rgba(255,200,87,0.4);
    background:rgba(255,200,87,0.07);
    text-align:center;
  }
  .confirm-box.hidden{ display:none; }
  .confirm-text{ font-size:13px; margin-bottom:12px; color:var(--ink); }
  .confirm-actions{ display:flex; gap:10px; justify-content:center; }
  .confirm-actions .btn{ margin-top:0; flex:1; }
</style>
</head>
<body>
<div id="wrap">
  <div class="difficulty-bar"><i id="diffFill"></i></div>
  <div class="hud">
    <div class="stat">SCORE<b id="scoreVal">0</b></div>
    <div class="stat" id="targetStat" style="display:none;">TARGET<b id="targetVal">0</b></div>
    <div style="display:flex; align-items:flex-start; gap:14px; pointer-events:auto;">
      <div class="stat coins">COINS<b id="coinVal">0</b></div>
      <div class="icon-btn" id="settingsBtn" title="設定">⚙</div>
    </div>
  </div>

  <div class="settings-panel hidden" id="settingsPanel">
    <h2>SOUND SETTINGS</h2>
    <div class="slider-row">
      <div class="slabel"><span>マスター音量</span><span id="masterVal">70%</span></div>
      <input type="range" id="masterSlider" min="0" max="100" value="70">
    </div>
    <div class="slider-row">
      <div class="slabel"><span>BGM</span><span id="bgmVal">50%</span></div>
      <input type="range" id="bgmSlider" min="0" max="100" value="50">
    </div>
    <div class="slider-row">
      <div class="slabel"><span>効果音(SE)</span><span id="seVal">80%</span></div>
      <input type="range" id="seSlider" min="0" max="100" value="80">
    </div>
    <div class="slider-row">
      <div class="slabel"><span>BGMスタイル</span></div>
      <div class="toggle-group">
        <button class="toggle-btn" id="bgmAmbientBtn">アンビエント</button>
        <button class="toggle-btn" id="bgmPopBtn">ポップ</button>
      </div>
    </div>
    <button class="btn secondary" id="closeSettingsBtn">閉じる</button>
  </div>

  <canvas id="game"></canvas>

  <div class="chest-pop" id="chestPop">
    <div class="tag">REWARD CHEST</div>
    <div class="amt" id="chestAmt">+0</div>
  </div>

  <div class="hint" id="hint">タップ / クリック / スペースキーで上昇</div>

  <div class="overlay" id="startScreen">
    <div class="title">DRIFT PULSE</div>
    <div class="subtitle">光の粒となり、トンネルを駆け抜けろ</div>
    <div class="wallet">🪙 <span id="walletVal">0</span></div>
    <div id="orbPreview" style="width:34px;height:34px;border-radius:50%;margin:0 auto 14px;box-shadow:0 0 16px currentColor;"></div>
    <div class="mode-row">
      <button class="btn" id="startEndlessBtn">ENDLESS</button>
      <button class="btn" id="startChallengeBtn">CHALLENGE</button>
    </div>
    <button class="btn secondary" id="colorPickBtn">🛍 ショップ</button>
    <button class="btn secondary" id="settingsBtnStart">⚙ 設定</button>
    <div class="subtitle" style="margin-top:18px;">前兆の光を見て、次の動きを読め</div>
  </div>

  <div class="overlay hidden shop-bg" id="colorScreen">
    <div class="label">SHOP</div>
    <div class="wallet">🪙 <span id="walletValShop">0</span></div>

    <div class="shop-tabs">
      <button class="toggle-btn active" id="tabOrbBtn">オーブ</button>
      <button class="toggle-btn" id="tabBgBtn">背景</button>
      <button class="toggle-btn" id="tabWallBtn">壁</button>
    </div>

    <div class="shop-preview-box">
      <canvas id="previewCanvas" width="240" height="150"></canvas>
    </div>

    <div class="swatch-grid" id="shopSwatchGrid"></div>

    <div class="confirm-box hidden" id="confirmBox">
      <div class="confirm-text" id="confirmText">この色に変更しますか?</div>
      <div class="confirm-actions">
        <button class="btn" id="confirmYesBtn">はい</button>
        <button class="btn secondary" id="confirmNoBtn">いいえ</button>
      </div>
    </div>

    <button class="btn secondary" id="colorBackBtn">戻る</button>
  </div>

  <div class="overlay hidden" id="stageSelectScreen">
    <div class="label">STAGE SELECT</div>
    <div class="stage-grid" id="stageGrid"></div>
    <button class="btn secondary" id="stageSelectBackBtn">戻る</button>
  </div>

  <div class="overlay hidden" id="gameOverScreen">
    <div class="label" id="gameOverLabel">RUN OVER</div>
    <div class="bignum" id="finalScore">0</div>
    <div class="row">
      <div class="rowitem"><span class="label">BEST</span><b id="bestScore">0</b></div>
      <div class="rowitem"><span class="label">COINS</span><b id="finalCoins">0</b></div>
    </div>
    <button class="btn secondary" id="retryBtn">もう一度</button>
    <button class="btn secondary" id="backToMenuBtn">モード選択に戻る</button>
    <button class="btn secondary" id="settingsBtnOver">⚙ 設定</button>
  </div>

  <div class="overlay hidden" id="stageClearScreen">
    <div class="label" id="stageClearLabel">STAGE CLEAR</div>
    <div class="bignum" id="stageClearBonus">+0</div>
    <div class="subtitle">コインを獲得しました</div>
    <button class="btn" id="nextStageBtn">次のステージへ</button>
    <button class="btn secondary" id="stageClearToSelectBtn">ステージ選択に戻る</button>
  </div>

  <div class="overlay hidden" id="allClearScreen">
    <div class="label">ALL CLEAR!</div>
    <div class="subtitle" style="margin:8px 0 20px;">全ステージクリアおめでとうございます</div>
    <button class="btn secondary" id="allClearToSelectBtn">ステージ選択に戻る</button>
    <button class="btn secondary" id="allClearBackBtn">モード選択に戻る</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('wrap');

  let W, H;
  let scaleS = 1; // scale factor relative to a 640px-tall reference canvas, keeps difficulty feel consistent across screen sizes
  const REF_H = 640;
  function resize(){
    const rect = wrap.getBoundingClientRect();
    W = canvas.width = rect.width * devicePixelRatio;
    H = canvas.height = rect.height * devicePixelRatio;
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    scaleS = (H/devicePixelRatio) / REF_H;
  }
  window.addEventListener('resize', resize);

  // ---- Audio Manager (synthesized, no external files) ----
  const Audio_ = (() => {
    let ctxA = null;
    let master, bgmGain, seGain;
    let bgmPopTimer = null;
    let settings = { master:70, bgm:50, se:80, bgmMode:'pop' };
    try{
      const saved = JSON.parse(localStorage.getItem('driftpulse_audio') || 'null');
      if (saved) settings = Object.assign(settings, saved);
    }catch(e){}

    function ensure(){
      if (ctxA) return;
      ctxA = new (window.AudioContext || window.webkitAudioContext)();
      master = ctxA.createGain();
      master.gain.value = settings.master/100;
      master.connect(ctxA.destination);
      bgmGain = ctxA.createGain();
      bgmGain.gain.value = settings.bgm/100;
      bgmGain.connect(master);
      seGain = ctxA.createGain();
      seGain.gain.value = settings.se/100;
      seGain.connect(master);
    }

    function persist(){
      try{ localStorage.setItem('driftpulse_audio', JSON.stringify(settings)); }catch(e){}
    }

    function setVol(kind, val){
      settings[kind] = val;
      if (ctxA){
        if (kind==='master') master.gain.value = val/100;
        if (kind==='bgm') bgmGain.gain.value = val/100;
        if (kind==='se') seGain.gain.value = val/100;
      }
      persist();
    }

    function tone(freq, dur, type='sine', gainPeak=0.25, dest=seGain, glideTo=null){
      ensure();
      const t0 = ctxA.currentTime;
      const osc = ctxA.createOscillator();
      const g = ctxA.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t0+dur);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(gainPeak, t0+0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
      osc.connect(g); g.connect(dest);
      osc.start(t0); osc.stop(t0+dur+0.02);
    }

    function jump(){ tone(520, 0.09, 'square', 0.18, seGain, 780); }
    function coin(){ tone(1046, 0.06, 'sine', 0.2); setTimeout(()=>tone(1568,0.08,'sine',0.18), 55); }
    function chest(){
      [880, 1108, 1318, 1760].forEach((f,i)=> setTimeout(()=> tone(f, 0.13, 'triangle', 0.22), i*70));
    }
    function tierUp(){ tone(220, 0.4, 'sawtooth', 0.15, seGain, 660); }
    function hit(){
      ensure();
      const t0 = ctxA.currentTime;
      const bufSize = ctxA.sampleRate*0.25;
      const buf = ctxA.createBuffer(1, bufSize, ctxA.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
      const noise = ctxA.createBufferSource();
      noise.buffer = buf;
      const g = ctxA.createGain();
      g.gain.setValueAtTime(0.35, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0+0.25);
      noise.connect(g); g.connect(seGain);
      noise.start(t0);
    }
    function click(){ tone(400, 0.05, 'square', 0.12); }

    // -- Ambient BGM: slow evolving chord pad (replaces old static drone) --
    let bgmAmbientTimer = null;
    let bgmAmbientFilter = null;
    function startBgmAmbient(){
      ensure();
      if (bgmAmbientTimer) return;
      bgmAmbientFilter = ctxA.createBiquadFilter();
      bgmAmbientFilter.type = 'lowpass';
      bgmAmbientFilter.frequency.value = 1400;
      bgmAmbientFilter.Q.value = 0.3;
      bgmAmbientFilter.connect(bgmGain);

      // gentle 4-chord loop (Am7 - Fmaj7 - Cmaj7 - G), voiced softly
      const chords = [
        [220.00, 261.63, 329.63, 392.00], // Am7
        [174.61, 220.00, 261.63, 349.23], // Fmaj7
        [130.81, 164.81, 196.00, 261.63], // Cmaj7
        [196.00, 246.94, 293.66, 392.00], // G
      ];
      const chordDur = 6.0;
      let idx = 0;

      function playChord(){
        const freqs = chords[idx % chords.length];
        idx++;
        const t0 = ctxA.currentTime;
        freqs.forEach((f, i) => {
          const osc = ctxA.createOscillator();
          osc.type = 'triangle';
          osc.frequency.value = f;
          osc.detune.value = (i - freqs.length/2) * 3; // subtle, non-dissonant width
          const g = ctxA.createGain();
          const peak = 0.06 - i*0.008;
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(Math.max(peak,0.02), t0 + 1.8);
          g.gain.setValueAtTime(Math.max(peak,0.02), t0 + chordDur - 2.0);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + chordDur);
          osc.connect(g); g.connect(bgmAmbientFilter);
          osc.start(t0); osc.stop(t0 + chordDur + 0.1);
        });
      }
      playChord();
      bgmAmbientTimer = setInterval(playChord, chordDur*1000);
    }
    function stopBgmAmbient(){
      if (!bgmAmbientTimer) return;
      clearInterval(bgmAmbientTimer);
      bgmAmbientTimer = null;
      bgmAmbientFilter = null;
    }

    // -- Pop BGM: bright looping arpeggio + light beat --
    function startBgmPop(){
      ensure();
      if (bgmPopTimer) return;
      const notes = [523.25, 659.25, 783.99, 659.25, 880.00, 783.99, 659.25, 987.77];
      const bpm = 132;
      const stepDur = 60/bpm/2; // eighth notes
      let idx = 0;
      bgmPopTimer = setInterval(() => {
        const f = notes[idx % notes.length];
        tone(f, stepDur*0.85, 'triangle', 0.14, bgmGain);
        if (idx % 4 === 0) tone(f/2, stepDur*1.6, 'sine', 0.1, bgmGain);
        if (idx % 2 === 1) tone(1600, 0.02, 'square', 0.03, bgmGain);
        idx++;
      }, stepDur*1000);
    }
    function stopBgmPop(){
      if (!bgmPopTimer) return;
      clearInterval(bgmPopTimer);
      bgmPopTimer = null;
    }

    function startBgm(mode){
      if (mode) settings.bgmMode = mode;
      stopBgmAmbient(); stopBgmPop();
      if (settings.bgmMode === 'pop') startBgmPop(); else startBgmAmbient();
      persist();
    }
    function stopBgm(){ stopBgmAmbient(); stopBgmPop(); }
    function isBgmPlaying(){ return !!bgmAmbientTimer || !!bgmPopTimer; }

    return { ensure, setVol, jump, coin, chest, tierUp, hit, click, startBgm, stopBgm, isBgmPlaying, get settings(){return settings;} };
  })();

  // ---- Game State ----
  let running = false;
  let score = 0, coins = 0, best = 0;
  let sessionTotalCoins = 0;

  let spawnTimer = 0;
  let elapsed = 0;
  let nextChestScore = 15;

    { label:'ステージ4', desc:'重力が強く、ジャンプが重い', target:20, reward:40, tierCap:1, forceMovingOff:false, gapMult:1.05, gravityMult:1.55, jumpMult:0.78, orbSizeMult:1.0, speedMult:1.0 },

    { label:'ステージ6', desc:'オーブが大きい、隙間が余計に狭く感じる', target:18, reward:50, tierCap:1, forceMovingOff:true,  gapMult:1.15, gravityMult:1.0,  jumpMult:1.0, orbSizeMult:1.8, speedMult:1.0 },
    { label:'ステージ7', desc:'スクロールが速い、判断を急げ',   target:22, reward:60, tierCap:1, forceMovingOff:true,  gapMult:1.1,  gravityMult:1.0,  jumpMult:1.0, orbSizeMult:1.0, speedMult:1.5 },
    { label:'ステージ8', desc:'オーブは小さいが、高速+隙間が動く総仕上げ', target:28, reward:80, tierCap:2, forceMovingOff:false, gapMult:0.85, gravityMult:1.0,  jumpMult:1.0, orbSizeMult:0.65, speedMult:1.35 },

  // Backgrounds and walls are chosen independently in the shop, then combined at render time

    mono:   { cost:50, mode:'dark',   bgBottom:'#000000', tierTop:['#1a1a1a','#161616','#121212','#0e0e0e','#0a0a0a'] },

  const WALLS = {

  const ORB_COLORS = {
    cyan:   { cost:0,  c:'#4FF7D1' },
    pink:   { cost:30, c:'#ff3d7a' },
    amber:  { cost:30, c:'#ffb400' },

  // ---- Progress store (persists bank coins / best score / stage progress / owned cosmetics on this device) ----
  const Progress = (() => {
    let data = {
      bankCoins:0, bestScore:0, stageProgress:0,
      ownedBackgrounds:['dark','bright'], ownedWalls:['cyan','navy'], ownedOrbColors:['cyan'],
      activeBackground:'dark', activeWall:'cyan', activeOrbColor:'cyan'
    };
    try{
      const saved = JSON.parse(localStorage.getItem('driftpulse_progress') || 'null');
      if (saved) data = Object.assign(data, saved);
    }catch(e){}
    function persist(){ try{ localStorage.setItem('driftpulse_progress', JSON.stringify(data)); }catch(e){} }
    function addCoins(n){ data.bankCoins += n; persist(); }
    function spendCoins(n){ if (data.bankCoins >= n){ data.bankCoins -= n; persist(); return true; } return false; }
    function own(listKey, key){ if (!data[listKey].includes(key)){ data[listKey].push(key); persist(); } }
    function setActive(field, key){ data[field] = key; persist(); }
    function setBest(s){ if (s > data.bestScore){ data.bestScore = s; persist(); } }
    function unlockStage(idx){ if (idx > data.stageProgress){ data.stageProgress = idx; persist(); } }
    return { addCoins, spendCoins, own, setActive, setBest, unlockStage, get data(){ return data; } };
  })();

  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const colorScreen = document.getElementById('colorScreen');
  const stageSelectScreen = document.getElementById('stageSelectScreen');
  const stageClearScreen = document.getElementById('stageClearScreen');
  const allClearScreen = document.getElementById('allClearScreen');
  const scoreVal = document.getElementById('scoreVal');
  const coinVal = document.getElementById('coinVal');
  const diffFill = document.getElementById('diffFill');
  const chestPop = document.getElementById('chestPop');
  const chestAmt = document.getElementById('chestAmt');
  const hint = document.getElementById('hint');


  function reset(){
    score = 0; coins = 0; elapsed = 0; spawnTimer = 0; nextChestScore = 15; lastPatternTier = -1;
    shake = 0;
    wallsSpawned = 0;
    goalLine = null;
    const sizeMult = (gameMode === 'challenge' && STAGES[currentStage].orbSizeMult) ? STAGES[currentStage].orbSizeMult : 1;
    orb = { x: 90*scaleS, y: (H/devicePixelRatio)*0.4, vy: 0, r: 10*scaleS*sizeMult };
    walls = [];
    particles = [];
    trail = [];
    starLayers = [0,1,2].map(i => {
      const arr = [];
      const n = 14 + i*6;
      for(let k=0;k<n;k++) arr.push({ x: Math.random()*1000, y: Math.random()*1000 });
      return arr;
    });
  }

  // difficulty tiers unlock new obstacle behaviors -> implicit learning curve
  function difficultyTier(){
    let t;
    if (elapsed < 8) t = 0;         // simple single gaps
    else if (elapsed < 18) t = 1;   // moving gaps
    else if (elapsed < 32) t = 2;   // narrow gaps
    else if (elapsed < 50) t = 3;   // double walls
    else t = 4;                      // fast + moving + narrow
    if (gameMode === 'challenge') t = Math.min(t, STAGES[currentStage].tierCap);
    return t;
  }

  // gap/speed are expressed relative to the reference 640px-tall canvas, then
  // scaled by scaleS so the felt difficulty stays the same on any screen size
  function speedFor(tier){
    const m = stageMod();
    const mult = m && m.speedMult ? m.speedMult : 1;
    return (2.6 + tier*0.55) * scaleS * mult;
  }
  function stageMod(){ return gameMode === 'challenge' ? STAGES[currentStage] : null; }
  function gapFor(tier){
    const m = stageMod();
    const mult = m ? m.gapMult : 1;
    return Math.max(150 - tier*18, 90) * scaleS * mult;
  }
  function gravityMult(){ const m = stageMod(); return m ? m.gravityMult : 1; }
  function jumpMult(){ const m = stageMod(); return m ? m.jumpMult : 1; }
  function movingAllowed(tier){
    const m = stageMod();
    if (m && m.forceMovingOff) return false;
    return tier >= 1;
  }

  function hexToRgba(hex, a){
    const h = hex.replace('#','');
    const r = parseInt(h.substring(0,2),16);
    const g = parseInt(h.substring(2,4),16);
    const b = parseInt(h.substring(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function spawnWall(tier){
    const gap = gapFor(tier);
    const h = H/devicePixelRatio;
    // wider margin keeps gaps away from the very top/bottom, where they felt unfair
    const margin = Math.max(70*scaleS, h*0.16);
    let gapY = margin + Math.random()*(h - gap - margin*2);

    // cap how far the gap can jump vertically from the previous wall, so back-to-back
    // walls can never demand an impossible top-to-bottom sprint
    const prev = walls[walls.length - 1];
    if (prev){
      const maxDelta = h * 0.4;
      gapY = Math.max(prev.gapY - maxDelta, Math.min(prev.gapY + maxDelta, gapY));
      gapY = Math.max(margin, Math.min(h - gap - margin, gapY));
    }

    walls.push({
      x: (W/devicePixelRatio) + 20,
      gapY, gap,
      width: 26 * scaleS,
      moving: movingAllowed(tier),
      phase: Math.random()*Math.PI*2,
      passed:false,
      born: elapsed,
      telegraph: true
    });
  }

  function popChest(amount){
    chestAmt.textContent = '+' + amount;
    chestPop.classList.add('show');
    setTimeout(()=> chestPop.classList.remove('show'), 1100);
  }

  function update(dt){
    elapsed += dt;
    const tier = difficultyTier();
    if (tier !== lastPatternTier){
      const isFirstTier = lastPatternTier === -1;
      lastPatternTier = tier;
      // brief screen pulse when a new pattern tier begins (learning cue)
      particles.push({type:'tierFlash', life:0.6, max:0.6});
      if (!isFirstTier) Audio_.tierUp();
    }

    // trail (visual freshness: glowing tail behind the orb)
    trail.push({ x: orb.x, y: orb.y, life: 0.35, max:0.35 });
    trail = trail.filter(p => (p.life -= dt) > 0);
    if (shake > 0) shake = Math.max(0, shake - dt*3);

    // physics (gravity scaled so fall speed feels the same on any screen size)
    orb.vy += 22*scaleS*gravityMult()*dt;
    orb.y += orb.vy*dt*60*0.5;
    if (orb.y < orb.r){ orb.y = orb.r; orb.vy = 0; }
    const floor = (H/devicePixelRatio) - orb.r;
    if (orb.y > floor){ gameOver(); return; }

    // spawn
    spawnTimer -= dt;
    const spawnLimit = gameMode === 'challenge' ? STAGES[currentStage].target : Infinity;
    if (spawnTimer <= 0 && wallsSpawned < spawnLimit){
      spawnWall(tier);
      wallsSpawned++;
      spawnTimer = Math.max(2.15 - tier*0.13, 1.3);
    }

    const spd = speedFor(tier)*60*dt;
    for (const w of walls){
      w.x -= spd;
      if (w.moving){
        w.gapY += Math.sin(elapsed*1.6 + w.phase)*0.6;
        const margin = Math.max(70*scaleS, (H/devicePixelRatio)*0.16);
        const maxGapY = (H/devicePixelRatio) - w.gap - margin;
        w.gapY = Math.min(Math.max(w.gapY, margin), maxGapY);
      }
      if (w.telegraph && elapsed - w.born > 0.35) w.telegraph = false;

      if (!w.passed && w.x + w.width < orb.x - orb.r){
        w.passed = true;
        score += 1;
        if (Math.random() < 0.55){
          coins += 1;
          particles.push({type:'coinPop', x: orb.x, y: orb.y, life:0.4, max:0.4});
          Audio_.coin();
        }
        if (score >= nextChestScore){
          const bonus = 8 + Math.floor(Math.random()*10) + tier*3;
          coins += bonus;
          popChest(bonus);
          Audio_.chest();
          nextChestScore += 15 + tier*5;
        }
        if (gameMode === 'challenge' && score >= STAGES[currentStage].target && !goalLine){
          goalLine = { x: (W/devicePixelRatio) + 60, width: 14*scaleS, cleared:false };
        }
      }

      // collision
      const wallH = H/devicePixelRatio;
      const withinX = orb.x + orb.r > w.x && orb.x - orb.r < w.x + w.width;
      if (withinX){
        const inGap = orb.y - orb.r > w.gapY && orb.y + orb.r < w.gapY + w.gap;
        if (!inGap){ shake = 1; Audio_.hit(); gameOver(); return; }
      }
    }
    walls = walls.filter(w => w.x + w.width > -20);
    particles = particles.filter(p => (p.life -= dt) > 0);

    // goal line: no gap to dodge, just cross it like a finish tape
    if (goalLine){
      goalLine.x -= spd;
      if (!goalLine.cleared && orb.x - orb.r > goalLine.x + goalLine.width){
        goalLine.cleared = true;
        stageClear();
        return;
      }
    }

    scoreVal.textContent = score;
    coinVal.textContent = coins;
    diffFill.style.width = Math.min(100, (elapsed/60)*100) + '%';
  }

  function draw(){
    const w = W/devicePixelRatio, h = H/devicePixelRatio;
    const tier = difficultyTier();
    const bg = BACKGROUNDS[Progress.data.activeBackground] || BACKGROUNDS.dark;
    const wl_ = WALLS[Progress.data.activeWall] || WALLS.cyan;
    const orbColor = (ORB_COLORS[Progress.data.activeOrbColor] || ORB_COLORS.cyan).c;
    const topColor = bg.tierTop[Math.min(tier, bg.tierTop.length-1)];
    const wallColor = wl_.tierWall[Math.min(tier, wl_.tierWall.length-1)];

    ctx.save();
    if (shake > 0){
      const sx = (Math.random()-0.5)*10*shake;
      const sy = (Math.random()-0.5)*10*shake;
      ctx.translate(sx, sy);
    }

    ctx.clearRect(-20,-20,w+40,h+40);

    // background tunnel gradient breathing with difficulty
    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, topColor);
    grad.addColorStop(1, bg.bgBottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,w,h);

    // parallax star layers (novelty: depth + speed variety per layer)
    const isLight = bg.mode === 'bright';
    const starAlphaBase = isLight ? 0.06 : 0.04;
    starLayers.forEach((layer, li) => {
      const speed = 8 + li*14;
      const size = 1 + li*0.6;
      ctx.fillStyle = isLight
        ? `rgba(0,0,0,${starAlphaBase + li*0.02})`
        : `rgba(255,255,255,${starAlphaBase + li*0.03})`;
      for (const s of layer){
        const x = ((s.x - elapsed*speed) % w + w) % w;
        const y = (s.y % h + h) % h;
        ctx.fillRect(x, y, size, size);
      }
    });

    // walls
    for (const wl of walls){
      ctx.fillStyle = wl.telegraph ? hexToRgba(wl_.telegraph, 0.35) : wallColor;
      // top
      ctx.fillRect(wl.x, 0, wl.width, wl.gapY);
      // bottom
      ctx.fillRect(wl.x, wl.gapY + wl.gap, wl.width, h - (wl.gapY+wl.gap));
      if (wl.telegraph){
        ctx.strokeStyle = wl_.telegraph;
        ctx.lineWidth = 2;
        ctx.strokeRect(wl.x, wl.gapY, wl.width, wl.gap);
      }
    }

    // goal line: a full-height checkered finish tape you simply need to cross (no gap to dodge)
    if (goalLine){
      const checkSize = Math.max(8, 10*scaleS);
      for (let yy = 0; yy < h; yy += checkSize){
        for (let xx = goalLine.x; xx < goalLine.x + goalLine.width; xx += checkSize){
          const isBlack = (Math.round((xx - goalLine.x) / checkSize) + Math.round(yy / checkSize)) % 2 === 0;
          ctx.fillStyle = isBlack ? '#101010' : '#f5f5f5';
          ctx.fillRect(xx, yy, Math.min(checkSize, goalLine.x + goalLine.width - xx), Math.min(checkSize, h - yy));
        }
      }
      ctx.strokeStyle = '#ffd460';
      ctx.lineWidth = 3;
      ctx.strokeRect(goalLine.x, 0, goalLine.width, h);
    }

    // orb trail (novelty: glowing tail)
    for (const p of trail){
      const a = p.life/p.max;
      ctx.beginPath();
      ctx.fillStyle = orbColor;
      ctx.globalAlpha = a*0.35;
      ctx.arc(p.x, p.y, orb.r*a, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // orb
    ctx.beginPath();
    ctx.fillStyle = orbColor;
    ctx.shadowColor = orbColor;
    ctx.shadowBlur = 16;
    ctx.arc(orb.x, orb.y, orb.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // tier flash / coin pop particles
    for (const p of particles){
      if (p.type === 'tierFlash'){
        ctx.fillStyle = `rgba(255,200,87,${p.life/p.max*0.15})`;
        ctx.fillRect(0,0,w,h);
      }
      if (p.type === 'coinPop'){
        ctx.fillStyle = `rgba(255,200,87,${p.life/p.max})`;
        ctx.font = '14px sans-serif';
        ctx.fillText('+1', p.x+12, p.y - (p.max-p.life)*30);
      }
    }
    ctx.restore();
  }

  let lastTime = null;
  function loop(t){
    if (!running) return;
    if (lastTime === null) lastTime = t;
    const dt = Math.min((t-lastTime)/1000, 0.05);
    lastTime = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  let lastFlapTime = -Infinity;
  function flap(){
    if (!running) return;
    // small cooldown so keyboard-mashing can't out-perform a single tap on touch —
    // both input methods now behave the same way
    const now = performance.now();
    if (now - lastFlapTime < 110) return;
    lastFlapTime = now;
    orb.vy = -8.1*scaleS*jumpMult();
    Audio_.jump();
  }

  function updateWalletDisplays(){

  function goHome(){

  const stageGrid = document.getElementById('stageGrid');
  function buildStageGrid(){
    stageGrid.innerHTML = '';
    STAGES.forEach((s, i) => {
      const unlocked = i <= Progress.data.stageProgress;
      const cleared = i < Progress.data.stageProgress;
      const card = document.createElement('div');
      card.className = 'stage-card' + (unlocked ? '' : ' locked') + (cleared ? ' cleared' : '');
      const icon = cleared ? '✅' : (unlocked ? '▶' : '🔒');
      card.innerHTML = `
        <div class="num">${i+1}</div>
        <div class="info">
          <div class="name">${s.label}${cleared ? ' <span class=\"clear-badge\">CLEAR</span>' : ''}</div>
          <div class="desc">${s.desc}</div>
          <div class="target">目標スコア ${s.target} ・ 報酬 🪙${s.reward}</div>
        </div>
        <div class="lock-icon">${icon}</div>
      `;
      if (unlocked){
        card.onclick = () => { Audio_.click(); startGame('challenge', i); };
      }
      stageGrid.appendChild(card);
    });
  }

  function showStageSelect(){
    hideAllOverlays();
    buildStageGrid();
    stageSelectScreen.classList.remove('hidden');
  }

  function gameOver(){
    running = false;
    Audio_.stopBgm();
    Progress.addCoins(coins);
    const label = document.getElementById('gameOverLabel');
    const backBtn = document.getElementById('backToMenuBtn');
    if (gameMode === 'endless'){
      Progress.setBest(score);
      best = Progress.data.bestScore;
      label.textContent = 'RUN OVER';
      backBtn.textContent = 'モード選択に戻る';
    } else {
      label.textContent = 'STAGE FAILED';
      backBtn.textContent = 'ステージ選択に戻る';
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestScore').textContent = Progress.data.bestScore;
    document.getElementById('finalCoins').textContent = coins;
    updateWalletDisplays();
    gameOverScreen.classList.remove('hidden');
  }

  function stageClear(){
    running = false;
    Audio_.stopBgm();
    const reward = STAGES[currentStage].reward;
    Progress.addCoins(coins + reward);
    Progress.unlockStage(currentStage + 1);
    updateWalletDisplays();
    if (currentStage + 1 < STAGES.length){
      document.getElementById('stageClearBonus').textContent = '+' + (coins + reward);
      stageClearScreen.classList.remove('hidden');
    } else {
      allClearScreen.classList.remove('hidden');
    }
  }

  function startGame(mode, stageIdx){
    gameMode = mode || 'endless';
    currentStage = (stageIdx != null) ? stageIdx : 0;
    const targetStat = document.getElementById('targetStat');
    const targetVal = document.getElementById('targetVal');
    if (gameMode === 'challenge'){
      targetStat.style.display = '';
      targetVal.textContent = STAGES[currentStage].target;
    } else {
      targetStat.style.display = 'none';
    }
    Audio_.ensure();
    Audio_.startBgm();
    resize();
    reset();
    hideAllOverlays();
    running = true;
    lastTime = null;
    requestAnimationFrame(loop);
  }

  document.getElementById('startEndlessBtn').onclick = () => { Audio_.click(); startGame('endless'); };
  document.getElementById('startChallengeBtn').onclick = () => { Audio_.click(); showStageSelect(); };
  document.getElementById('stageSelectBackBtn').onclick = () => { Audio_.click(); goHome(); };
  document.getElementById('retryBtn').onclick = () => { Audio_.click(); startGame(gameMode, currentStage); };
  document.getElementById('backToMenuBtn').onclick = () => {
    Audio_.click();
    if (gameMode === 'challenge') showStageSelect(); else goHome();
  };
  document.getElementById('nextStageBtn').onclick = () => {
    Audio_.click();
    stageClearScreen.classList.add('hidden');
    startGame('challenge', currentStage + 1);
  };
  document.getElementById('stageClearToSelectBtn').onclick = () => { Audio_.click(); showStageSelect(); };
  document.getElementById('allClearToSelectBtn').onclick = () => { Audio_.click(); showStageSelect(); };
  document.getElementById('allClearBackBtn').onclick = () => { Audio_.click(); goHome(); };

  // ---- Settings panel wiring ----
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsBtnStart = document.getElementById('settingsBtnStart');
  const settingsBtnOver = document.getElementById('settingsBtnOver');
  const settingsPanel = document.getElementById('settingsPanel');
  const closeSettingsBtn = document.getElementById('closeSettingsBtn');
  const masterSlider = document.getElementById('masterSlider');
  const bgmSlider = document.getElementById('bgmSlider');
  const seSlider = document.getElementById('seSlider');
  const masterVal = document.getElementById('masterVal');
  const bgmVal = document.getElementById('bgmVal');
  const seVal = document.getElementById('seVal');

  masterSlider.value = Audio_.settings.master;
  bgmSlider.value = Audio_.settings.bgm;
  seSlider.value = Audio_.settings.se;
  masterVal.textContent = Audio_.settings.master + '%';
  bgmVal.textContent = Audio_.settings.bgm + '%';
  seVal.textContent = Audio_.settings.se + '%';

  const bgmAmbientBtn = document.getElementById('bgmAmbientBtn');
  const bgmPopBtn = document.getElementById('bgmPopBtn');

  function refreshToggleUI(){
    bgmAmbientBtn.classList.toggle('active', Audio_.settings.bgmMode === 'ambient');
    bgmPopBtn.classList.toggle('active', Audio_.settings.bgmMode === 'pop');
  }
  refreshToggleUI();

  bgmAmbientBtn.onclick = () => {
    Audio_.click();
    Audio_.startBgm('ambient');
    refreshToggleUI();
  };
  bgmPopBtn.onclick = () => {
    Audio_.click();
    Audio_.startBgm('pop');
    refreshToggleUI();
  };

  function applySkinDisplay(){
    const bg = BACKGROUNDS[Progress.data.activeBackground] || BACKGROUNDS.dark;
    wrap.setAttribute('data-theme', bg.mode);
  }
  applySkinDisplay();

  function openSettings(){
    const wasRunning = running;
    if (wasRunning) running = false; // pause while adjusting sound
    settingsPanel.dataset.wasRunning = wasRunning ? '1':'0';
    settingsPanel.classList.remove('hidden');
  }
  settingsBtn.onclick = openSettings;
  settingsBtnStart.onclick = () => { Audio_.click(); openSettings(); };
  settingsBtnOver.onclick = () => { Audio_.click(); openSettings(); };

  closeSettingsBtn.onclick = () => {
    Audio_.click();
    settingsPanel.classList.add('hidden');
    if (settingsPanel.dataset.wasRunning === '1'){
      running = true;
      lastTime = null;
      requestAnimationFrame(loop);
    }
  };
  masterSlider.oninput = () => { Audio_.setVol('master', +masterSlider.value); masterVal.textContent = masterSlider.value + '%'; };
  bgmSlider.oninput = () => { Audio_.setVol('bgm', +bgmSlider.value); bgmVal.textContent = bgmSlider.value + '%'; };
  seSlider.oninput = () => { Audio_.setVol('se', +seSlider.value); seVal.textContent = seSlider.value + '%'; Audio_.jump(); };

  // ---- Shop: pick a category (orb / bg / wall) -> preview -> confirm before applying ----
  const orbPreview = document.getElementById('orbPreview');
  const shopSwatchGrid = document.getElementById('shopSwatchGrid');
  const colorPickBtn = document.getElementById('colorPickBtn');
  const colorBackBtn = document.getElementById('colorBackBtn');
  const tabOrbBtn = document.getElementById('tabOrbBtn');
  const tabBgBtn = document.getElementById('tabBgBtn');
  const tabWallBtn = document.getElementById('tabWallBtn');
  const previewCanvas = document.getElementById('previewCanvas');
  const confirmBox = document.getElementById('confirmBox');
  const confirmText = document.getElementById('confirmText');
  const confirmYesBtn = document.getElementById('confirmYesBtn');
  const confirmNoBtn = document.getElementById('confirmNoBtn');

  const SHOP_DICTS = { orb: ORB_COLORS, bg: BACKGROUNDS, wall: WALLS };
  const SHOP_OWNED_FIELD = { orb:'ownedOrbColors', bg:'ownedBackgrounds', wall:'ownedWalls' };
  const SHOP_ACTIVE_FIELD = { orb:'activeOrbColor', bg:'activeBackground', wall:'activeWall' };
  let shopTab = 'orb';
  let pendingKey = null;

  function updateOrbPreview(){
    const c = (ORB_COLORS[Progress.data.activeOrbColor] || ORB_COLORS.cyan).c;
    orbPreview.style.background = c;
    orbPreview.style.color = c;
  }

  function swatchPreviewColor(cat, key){
    const item = SHOP_DICTS[cat][key];
    if (cat === 'orb') return item.c;
    if (cat === 'bg') return item.tierTop[0];
    return item.tierWall[0];
  }

  // Renders a small mock scene combining the 3 active cosmetics; if candidateKey is given,
  // it swaps in that candidate for the currently open shop tab only (live "what if" preview).
  function renderShopPreview(candidateKey){
    const orbKey  = (shopTab === 'orb'  && candidateKey) ? candidateKey : Progress.data.activeOrbColor;
    const bgKey   = (shopTab === 'bg'   && candidateKey) ? candidateKey : Progress.data.activeBackground;
    const wallKey = (shopTab === 'wall' && candidateKey) ? candidateKey : Progress.data.activeWall;
    const orbC = ORB_COLORS[orbKey].c;
    const bgObj = BACKGROUNDS[bgKey];
    const wallObj = WALLS[wallKey];

    const pctx = previewCanvas.getContext('2d');
    const pw = previewCanvas.width, ph = previewCanvas.height;
    pctx.clearRect(0,0,pw,ph);
    const grad = pctx.createLinearGradient(0,0,0,ph);
    grad.addColorStop(0, bgObj.tierTop[0]);
    grad.addColorStop(1, bgObj.bgBottom);
    pctx.fillStyle = grad;
    pctx.fillRect(0,0,pw,ph);

    const wallX = pw*0.62, wallW = 20, gap = 56, gapY = ph*0.34;
    pctx.fillStyle = wallObj.tierWall[0];
    pctx.fillRect(wallX, 0, wallW, gapY);
    pctx.fillRect(wallX, gapY+gap, wallW, ph-(gapY+gap));

    pctx.beginPath();
    pctx.fillStyle = orbC;
    pctx.shadowColor = orbC;
    pctx.shadowBlur = 12;
    pctx.arc(pw*0.24, ph*0.5, 11, 0, Math.PI*2);
    pctx.fill();
    pctx.shadowBlur = 0;
  }

  function hideConfirm(){
    pendingKey = null;
    confirmBox.classList.add('hidden');
    confirmText.style.color = '';
  }

  function showConfirmFor(key){
    const owned = Progress.data[SHOP_OWNED_FIELD[shopTab]].includes(key);
    const active = Progress.data[SHOP_ACTIVE_FIELD[shopTab]] === key;
    if (active){ hideConfirm(); return; } // already selected, nothing to confirm
    pendingKey = key;
    const item = SHOP_DICTS[shopTab][key];
    confirmText.style.color = '';
    confirmText.textContent = owned ? 'この見た目に変更しますか?' : `🪙 ${item.cost} を使って購入しますか?`;
    confirmBox.classList.remove('hidden');
  }

  function buildShopSwatches(){
    const dict = SHOP_DICTS[shopTab];
    const ownedList = Progress.data[SHOP_OWNED_FIELD[shopTab]];
    const activeKey = Progress.data[SHOP_ACTIVE_FIELD[shopTab]];
    shopSwatchGrid.innerHTML = '';
    Object.keys(dict).forEach(key => {
      const item = dict[key];
      const owned = ownedList.includes(key);
      const active = activeKey === key;
      const wrapEl = document.createElement('div');
      wrapEl.className = 'swatch-item';

      const el = document.createElement('div');
      el.className = 'swatch' + (active ? ' active' : '') + (!owned ? ' locked' : '');
      const pc = swatchPreviewColor(shopTab, key);
      el.style.background = pc;
      el.style.color = pc;
      wrapEl.appendChild(el);

      const price = document.createElement('div');
      price.className = 'swatch-price';
      price.textContent = owned ? (active ? '使用中' : '所持済み') : ('🪙 ' + item.cost);
      wrapEl.appendChild(price);

      el.onclick = () => {
        Audio_.click();
        showConfirmFor(key);
        renderShopPreview(key);
      };
      shopSwatchGrid.appendChild(wrapEl);
    });
  }

  function setShopTab(tab){
    shopTab = tab;
    hideConfirm();
    tabOrbBtn.classList.toggle('active', tab === 'orb');
    tabBgBtn.classList.toggle('active', tab === 'bg');
    tabWallBtn.classList.toggle('active', tab === 'wall');
    buildShopSwatches();
    renderShopPreview();
  }

  tabOrbBtn.onclick = () => { Audio_.click(); setShopTab('orb'); };
  tabBgBtn.onclick = () => { Audio_.click(); setShopTab('bg'); };
  tabWallBtn.onclick = () => { Audio_.click(); setShopTab('wall'); };

  confirmYesBtn.onclick = () => {
    if (!pendingKey) return;
    const key = pendingKey;
    const owned = Progress.data[SHOP_OWNED_FIELD[shopTab]].includes(key);
    if (owned){
      Audio_.click();
    } else {
      const cost = SHOP_DICTS[shopTab][key].cost;
      if (!Progress.spendCoins(cost)){
        confirmText.style.color = '#ff5b3d';
        confirmText.textContent = `コインが足りません(あと🪙${cost - Progress.data.bankCoins})`;
        Audio_.click();
        return; // keep dialog open so they can cancel or come back later
      }
      Progress.own(SHOP_OWNED_FIELD[shopTab], key);
      Audio_.chest();
    }
    Progress.setActive(SHOP_ACTIVE_FIELD[shopTab], key);
    hideConfirm();
    buildShopSwatches();
    updateWalletDisplays();
    updateOrbPreview();
    applySkinDisplay();
    renderShopPreview();
    if (!running) draw();
  };

  confirmNoBtn.onclick = () => {
    Audio_.click();
    hideConfirm();
    renderShopPreview();
  };

  setShopTab('orb');
  updateOrbPreview();
  updateWalletDisplays();

  colorPickBtn.onclick = () => {
    Audio_.click();
    startScreen.classList.add('hidden');
    setShopTab('orb');
    updateWalletDisplays();
    colorScreen.classList.remove('hidden');
  };
  colorBackBtn.onclick = () => {
    Audio_.click();
    colorScreen.classList.add('hidden');
    startScreen.classList.remove('hidden');
  };

  window.addEventListener('keydown', e => { if (e.code === 'Space'){ e.preventDefault(); if (e.repeat) return; flap(); }});

  function isInteractiveTarget(target){
    return !!target.closest('button, input, .swatch, .toggle-btn, .icon-btn, .settings-panel, .overlay');
  }

  wrap.addEventListener('mousedown', e => { if (isInteractiveTarget(e.target)) return; flap(); });
  wrap.addEventListener('touchstart', e => {
    if (isInteractiveTarget(e.target)) return; // let buttons/sliders/overlays receive their own tap
    e.preventDefault(); flap();
  }, {passive:false});

  resize();
  reset();
  draw();
})();
</script>
</body>
</html>
